baseURL: "https://www.mybearisyellow.me/"
title: "MyBearIsYellow"
theme: "congo"
locale: "fr-FR"
defaultContentLanguage: "fr"
disableLanguages: ["en"]
copyright: "© 2026 MyBearIsYellow"

languages:
  fr:
    label: "Français"
    weight: 1

enableEmoji: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
summaryLength: 40

pagination:
  pagerSize: 12

ignoreLogs: ["warning-goldmark-raw-html"]

minify:
  disableXML: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    lineNos: false
    noClasses: false
    style: github-dark
    tabWidth: 2
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

taxonomies:
  tag: tags

sitemap:
  excludedKinds: ["taxonomy", "term"]

privacy:
  vimeo:
    enableDNT: true
  x:
    enableDNT: true
  youTube:
    privacyEnhanced: true

menu:
  main:
    - name: "Architecture"
      pageRef: "/architecture-logicielle"
      weight: 1
    - name: "Design Patterns"
      pageRef: "/design-patterns"
      weight: 2
    - name: "Bases de données"
      pageRef: "/bases-de-donnees"
      weight: 3
    - name: "Tests"
      pageRef: "/tests"
      weight: 4
    - name: "Cloud & DevOps"
      pageRef: "/cloud-devops"
      weight: 5
    - name: "Entretiens"
      pageRef: "/preparation-entretien"
      weight: 6
    - name: "Recherche"
      params:
        action: "search"
        icon: "search"
        showName: false
      weight: 7
    - name: "Apparence"
      params:
        action: "appearance"
        icon: "moon"
        showName: false
      weight: 8

  footer:
    - name: "🐻 Pourquoi notre ours est jaune ?"
      pageRef: "/notre-histoire"
      weight: 1
    - name: "Mentions légales"
      pageRef: "/mentions-legales"
      weight: 2
    - name: "Politique de confidentialité"
      pageRef: "/politique-de-confidentialite"
      weight: 3

params:
  env: production
  title: "MyBearIsYellow"
  mainSections:
    - concept
    - interview-hub
  description: "Les concepts du développement expliqués simplement : Design Patterns, Architecture, Bases de données, Tests, Cloud et DevOps — pour comprendre, retenir et réussir vos entretiens techniques."
  tagline: "Comprendre les concepts techniques. Les expliquer simplement."
  keywords:
    - Design Patterns
    - Architecture logicielle
    - Bases de données
    - Tests logiciels
    - Cloud
    - DevOps
    - Entretien technique
    - PHP
    - Java
    - JavaScript

  author:
    name: "MyBearIsYellow"
    email: "rajekevin@hotmail.fr"

  colorScheme: "bear"
  defaultAppearance: "dark"
  autoSwitchAppearance: false

  enableSearch: true
  enableCodeCopy: true
  enableImageLazyLoading: true
  enableImageWebp: true
  enableQuicklink: true

  fingerprintAlgorithm: "sha256"

  header:
    layout: "hybrid"
    showTitle: true

  footer:
    showCopyright: true
    showThemeAttribution: false
    showAppearanceSwitcher: true
    showScrollToTop: true

  homepage:
    layout: "custom"
    showRecent: true
    recentLimit: 6

  article:
    showDate: true
    showDateUpdated: false
    showAuthor: false
    showBreadcrumbs: true
    showDraftLabel: true
    showEdit: false
    showHeadingAnchors: true
    showPagination: true
    showReadingTime: true
    showTableOfContents: true
    showTaxonomies: true
    showWordCount: false
    showComments: false

  list:
    showBreadcrumbs: true
    showSummary: true
    showTableOfContents: false
    showTaxonomies: true
    groupByYear: false
    paginationWidth: 1

  taxonomy:
    showTermCount: true

  newsletter:
    buttondownUsername: "MasterSinge"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 2
    keys:
      - title
      - permalink
      - summary
      - content

  socialIcons:
    - name: github
      url: "https://github.com/rajekevin"
    - name: linkedin
      url: "https://linkedin.com/in/rajekevin"
    - name: email
      url: "mailto:rajekevin@hotmail.fr"
